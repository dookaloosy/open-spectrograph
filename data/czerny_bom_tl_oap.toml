[slits]
# Both entrance and exit apertures are bare multimode SMA fibers
# mounted in HASMA bulkhead adapters. The fiber core diameter defines
# the aperture — no separate slit blade.
#   width_um  = fiber core diameter (dispersion direction)
#   height_mm = fiber core diameter (spatial direction)
# A circular 400 μm core is modelled as a 0.4 mm × 0.4 mm square
# emitter (area differs by π/4; bandpass depends only on width).
width_um                = 400.0
height_mm               = 0.4
blade_thickness_mm      = 0.0

# No separate slit mount — the HASMA threads into the housing wall.
# Four fundamental dimensions; everything else is derived.
[slits.mount]
type                    = "hasma_direct"
length_mm               = 9.652         # full adapter, slit plane to far end
bore_radius_mm          = 3.25          # SMA thread bore half-diameter
hex_half_mm             = 4.6           # hex nut half across-flats (widest = 9.2mm)
boundary_mm             = 3.873         # slit plane to hex nut inner face
wall_half_mm            = 12.5          # half-width of minimum housing wall section

[slits.entrance_options.HASMA]
type                    = "fiber_adapter_sma"
aperture_diameter_um    = 400.0
adapter_length_mm       = 9.0
cost_usd                = 10.04

