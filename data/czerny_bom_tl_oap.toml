# OAP Czerny-Turner BOM — paraboloidal (off-axis parabolic) M1/M2, flat fold mirrors.
# Derived from `czerny_spec.toml` — every field below should be
# justifiable by pointing back at a spec field. See
# `.kb/roadmap.md` ("Layer cake") for the discipline rules.
#
# Per-component structure:
#   - M1, M2, and grating are GA-evolved between vendor options.
#   - Entrance fiber adapter (HASMA) threads into housing wall.
#   - Detector (TCD1304) sits at the exit focal plane.
#
# The `[mirrors.m1_options]` and `[grating_options]` tables list the
# GA-evolved discrete choices; `[mirrors.m1]` and `[grating]` pick
# the default/baseline from those tables.
# `designs.czerny.load_parts()` instantiates a `CzernyParts` from
# the baseline values; the GA runner rebuilds `CzernyParts` per
# candidate by looking up the chosen option.
#
# Pricing: vendor retail USD, web-verified 2026-04-13 from the
# live product pages. Re-check before any real purchase.

geometry = "czerny"

# ── Global manufacturing parameters ─────────────────────────────────────────
# These apply to all flexure mount types. Per-mount BOM entries should
# NOT repeat these; the code reads them from [manufacturing].

[manufacturing]
# Print / machining tolerances
assembly_clearance_mm   = 0.1           # bore oversize for optic assembly fit
print_tolerance_mm      = 0.1           # ± FDM/SLA dimensional tolerance
fillet_radius_mm        = 2.0           # internal fillet radius (channel, tongue junction)

# Metric bolt dimensions (ISO standard socket-head cap screws)
[manufacturing.bolts.M2]
thread_dia_mm           = 2.0           # nominal thread diameter
head_dia_mm             = 4.0           # socket head cap screw head diameter
clearance_dia_mm        = 2.4           # through-hole clearance diameter
tap_drill_dia_mm        = 1.6           # tap drill diameter for threading

[manufacturing.bolts."M2.5"]
thread_dia_mm           = 2.5
head_dia_mm             = 5.0
clearance_dia_mm        = 2.7
tap_drill_dia_mm        = 2.0

# Heat-set insert: McMaster 94459A110, M2 × 0.4 brass, for plastics
[manufacturing.insert]
insert_part             = "94459A110"
insert_thread           = "M2"
insert_bore_dia_mm      = 3.3           # drill/print bore diameter (knurl press-fits in)
insert_length_mm        = 2.5           # insert body length (flush with face when installed)
insert_min_material_mm  = 4.0           # min surrounding wall thickness per spec
insert_chamfer_mm       = 0.5           # snowplow relief chamfer at bore entry
insert_flange_dia_mm    = 3.6           # insert flange outer diameter (for trim offset calc)

# ── Optics ──────────────────────────────────────────────────────────────────

[mirrors.m1_options.MPD029-G01]
# Ø1/2" protected-aluminum 90° off-axis parabolic, RFL = 50.8 mm.
focal_length_mm         = 50.8          # reflected focal length (RFL)
diameter_mm             = 12.7          # cylinder diameter
reflectance             = 0.90          # scalar reflectance (Al, 12° AOI)
reflectance_file        = "data/efficiency/reflectance_protected_al_12deg.csv"
edge_thickness_mm            = 18.8          # cylinder height (for raysect CSG)
mirror_type             = "paraboloidal"# spherical or paraboloidal
off_axis_angle_deg      = 90.0          # vendor convention (incidence = OAA/2)
center_thickness_mm     = 12.1          # back face to optical centre (chief-ray intersection)
cost_usd                = 175.39        # vendor retail USD (2026-04)

[mirrors.m1_options.MPD029-G01.mount]
type                    = "oap_flexure"
# -- optic retention --
bolt_circle_radius_mm   = 4.0           # MPD029 vendor bolt circle radius
n_holes                 = 6             # hex pattern
hole_phase_deg          = 30.0          # angular offset of first hole from 0 deg
clearance_hole_dia_mm   = 3.3           # #4-40 through-hole diameter
counterbore_dia_mm      = 5.5           # #4-40 flat-head countersink major diameter
screw_part              = "91771A108"   # #4-40 × 3/8" Phillips flat head screw
# -- slab geometry --
slab_thickness_mm       = 6.0           # total slab depth in u direction
head_clearance_mm       = 5.0           # material above optic centre to top face
foot_clearance_mm       = 4.00          # material below optic centre to slab bottom
# -- foot geometry --
foot_thickness_mm       = 5.0           # foot slab thickness in w direction
foot_bolt_thread        = "M2.5"          # foot rail clearance hole thread
foot_bolt_spacing_mm    = 3.5           # bolt half-spacing in v direction
bolt_safety_mm          = 2.0           # clearance around bolt head to foot edge
front_bolt_offset_mm    = 5.0          # tongue bolt u-offset (past COM for anti-topple)
# -- flexure --
flexure_thickness_mm    = 0.80          # web thickness in u
flexure_gap_mm          = 1.0           # relief gap height between slab and foot
trim_angle_deg          = 2.0           # foot bottom angle for pitch preload
