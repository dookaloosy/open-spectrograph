# Spherical Czerny-Turner BOM — Thorlabs f=100mm spherical M1/M2,
# 600 g/mm grating, flat F1 fold mirror. Restricted single-combo BOM
# for the baseline standard CT design.
#
# Optical train: 25 µm fiber (NA 0.12) → HASMA → F1 flat fold →
# M1 spherical (f=100mm) → grating (600 lpm) → M2 spherical (f=100mm)
# → TCD1304 detector.

geometry = "czerny"

# ── Global manufacturing parameters ─────────────────────────────────────────

[manufacturing]
assembly_clearance_mm   = 0.1
print_tolerance_mm      = 0.1
fillet_radius_mm        = 2.0

[manufacturing.bolts.M2]
thread_dia_mm           = 2.0
head_dia_mm             = 4.0
clearance_dia_mm        = 2.4
tap_drill_dia_mm        = 1.6

[manufacturing.bolts."M2.5"]
thread_dia_mm           = 2.5
head_dia_mm             = 5.0
clearance_dia_mm        = 2.7
tap_drill_dia_mm        = 2.0

[manufacturing.insert]
insert_part             = "94459A110"
insert_thread           = "M2"
insert_bore_dia_mm      = 3.3
insert_length_mm        = 2.5
insert_min_material_mm  = 4.0
insert_chamfer_mm       = 0.5
insert_flange_dia_mm    = 3.6

# ── Optics ──────────────────────────────────────────────────────────────────

[mirrors.m1_options.CM254-100-G01]
# Ø1" protected-aluminum concave spherical, f = 100 mm.
# f/# = 100/25.4 = f/3.94 — matched to 25 µm NA 0.12 fiber (f/4.2).
focal_length_mm         = 100.0
diameter_mm             = 25.4
reflectance             = 0.90
reflectance_file        = "data/efficiency/reflectance_protected_al_12deg.csv"
cost_usd                = 70.88
center_thickness_mm     = 6.0
edge_thickness_mm       = 6.4
mirror_type             = "spherical"
off_axis_angle_deg      = 0.0

[mirrors.m1_options.CM254-100-G01.mount]
type                    = "mirror_flexure"
optic_clearance_mm       = 2.0
shoulder_width_mm       = 1.0
channel_width_mm        = 12.7
channel_extension_mm    = 1.0
wall_margin_mm          = 2.0
head_clearance_mm       = 5.0
foot_clearance_mm       = 3.80
rear_wall_mm            = 3.0
foot_thickness_mm       = 5.0
foot_bolt_thread        = "M2.5"
foot_bolt_spacing_mm    = 8.0
bolt_safety_mm          = 2.0
front_bolt_offset_mm    = 8.0
flexure_thickness_mm    = 0.80
flexure_gap_mm          = 1.0
trim_angle_deg          = 2.0

[mirrors.m2_options.CM508-100-G01]
# Ø2" protected-aluminum concave spherical, f = 100 mm.
# Larger aperture captures beam walk across the bandpass.
focal_length_mm         = 100.0
diameter_mm             = 50.8
reflectance             = 0.90
reflectance_file        = "data/efficiency/reflectance_protected_al_12deg.csv"
cost_usd                = 137.52
center_thickness_mm     = 9.0
edge_thickness_mm       = 10.6
mirror_type             = "spherical"
off_axis_angle_deg      = 0.0

[mirrors.m2_options.CM508-100-G01.mount]
type                    = "mirror_flexure"
optic_clearance_mm       = 2.0
shoulder_width_mm       = 1.0
channel_width_mm        = 25.4
channel_extension_mm    = 1.0
wall_margin_mm          = 2.0
head_clearance_mm       = 5.0
foot_clearance_mm       = 3.00
rear_wall_mm            = 3.0
foot_thickness_mm       = 5.0
foot_bolt_thread        = "M2.5"
foot_bolt_spacing_mm    = 20.0
bolt_safety_mm          = 2.0
front_bolt_offset_mm    = 8.0
flexure_thickness_mm    = 0.80
flexure_gap_mm          = 1.0
trim_angle_deg          = 2.0
contact_radius_mm       = 1.5
contact_offset_mm       = 1.0
contact_separation_mm   = 25.4


[mirrors.m2_options.CM254-100-G01]
focal_length_mm         = 100.0
diameter_mm             = 25.4
reflectance             = 0.90
reflectance_file        = "data/efficiency/reflectance_protected_al_12deg.csv"
cost_usd                = 70.88
center_thickness_mm     = 6.0
edge_thickness_mm       = 6.4
mirror_type             = "spherical"
off_axis_angle_deg      = 0.0

[mirrors.m2_options.CM254-100-G01.mount]
type                    = "mirror_flexure"
optic_clearance_mm       = 2.0
shoulder_width_mm       = 1.0
channel_width_mm        = 12.7
channel_extension_mm    = 1.0
wall_margin_mm          = 2.0
head_clearance_mm       = 5.0
foot_clearance_mm       = 3.80
rear_wall_mm            = 3.0
foot_thickness_mm       = 5.0
foot_bolt_thread        = "M2.5"
foot_bolt_spacing_mm    = 8.0
bolt_safety_mm          = 2.0
front_bolt_offset_mm    = 8.0
flexure_thickness_mm    = 0.80
flexure_gap_mm          = 1.0
trim_angle_deg          = 2.0
contact_radius_mm       = 1.5
contact_offset_mm       = 1.0
contact_separation_mm   = 12.7


[grating_options.GR25-0605]
# 25 × 25 mm, 600 g/mm, blaze 500 nm.
# RLD = 1/(600 × 0.100) = 16.7 nm/mm; BW on TCD1304 = 16.7 × 29.2 = 487 nm.
size_mm                 = 25.0
edge_thickness_mm            = 6.0
center_thickness_mm     = 6.0
groove_density_per_mm   = 600.0
blaze_nm                = 500.0
blaze_angle_deg         = 8.627
peak_efficiency         = 0.684
type                    = "ruled_reflective"
cost_usd                = 137.27
efficiency_file         = "data/efficiency/efficiency_GR25-0605.csv"

[grating_options.GR25-0605.mount]
type                    = "grating_flexure"
jaw_clearance_mm        = 3.0
optic_clearance_mm       = 2.0
contact_radius_mm       = 1.5
contact_offset_mm       = 1.0
contact_separation_mm   = 15.0
head_clearance_mm       = 5.0
foot_clearance_mm       = 4.00
rear_wall_mm            = 3.0
foot_thickness_mm       = 5.0
foot_bolt_thread        = "M2.5"
foot_bolt_spacing_mm    = 8.0
bolt_safety_mm          = 2.0
front_bolt_offset_mm    = 8.0
flexure_thickness_mm    = 0.80
flexure_gap_mm          = 1.0
trim_angle_deg          = 2.0

[mirrors.f1_options.PF05-03-G01]
# Ø1/2" (12.7mm) protected-Al flat, 6mm thick.
mirror_type             = "flat"
diameter_mm             = 12.7
edge_thickness_mm       = 6.0
center_thickness_mm     = 6.0
reflectance             = 0.90
reflectance_file        = "data/efficiency/reflectance_protected_al_12deg.csv"
cost_usd                = 42.60

[mirrors.f1_options.PF05-03-G01.mount]
type                    = "mirror_flexure"
optic_clearance_mm       = 2.0
shoulder_width_mm       = 1.0
channel_width_mm        = 6.35
channel_extension_mm    = 1.0
wall_margin_mm          = 2.0
head_clearance_mm       = 5.0
foot_clearance_mm       = 4.0
rear_wall_mm            = 3.0
foot_thickness_mm       = 5.0
foot_bolt_thread        = "M2.5"
foot_bolt_spacing_mm    = 3.5
bolt_safety_mm          = 2.0
front_bolt_offset_mm    = 5.0
flexure_thickness_mm    = 0.80
flexure_gap_mm          = 1.0
trim_angle_deg          = 2.0
contact_radius_mm       = 1.5
contact_offset_mm       = 1.0
contact_separation_mm   = 6.3


# ── Slit (25 µm SMA fiber, NA 0.12) ────────────────────────────────────────

[slits]
width_um                = 25.0
height_mm               = 0.025
blade_thickness_mm      = 0.0

[slits.mount]
type                    = "hasma_direct"
length_mm               = 9.652
bore_radius_mm          = 3.25
hex_half_mm             = 4.6
boundary_mm             = 3.873
wall_half_mm            = 12.5

[slits.entrance_options.HASMA]
type                    = "fiber_adapter_sma"
aperture_diameter_um    = 25.0
adapter_length_mm       = 9.0
cost_usd                = 10.04

[slits.exit_options.HASMA]
type                    = "fiber_adapter_sma"
aperture_diameter_um    = 25.0
adapter_length_mm       = 9.0
cost_usd                = 10.04

# ── Source ──────────────────────────────────────────────────────────────────

[source]
type                    = "tungsten_halogen"

# ── Housing ─────────────────────────────────────────────────────────────────

[housing]
wall_albedo             = 0.05

# ── Detector ────────────────────────────────────────────────────────────────

[detector]
part_number             = "TCD1304DG"
board                   = "TCD1304_SPI_Rev2EB"
type                    = "linear_ccd"
n_pixels                = 3648
pixel_pitch_um          = 8.0
pixel_height_um         = 200.0
array_length_mm         = 29.184
package_width_mm        = 41.6
package_height_mm       = 10.16
glass_to_die_mm         = 1.7
board_width_mm          = 70.0
board_height_mm         = 40.0
board_behind_die_mm     = 21.5
boundary_behind_die_mm  = 6.2
insert_spacing_width_mm = 62.0
insert_spacing_height_mm = 32.0
solder_clearance_depth_mm = 3.0
corner_boss_radius_mm   = 2.5
fixed_grating           = true
pixel_window            = 200

[controller]
board                   = "Controller_T4_R3EB"
board_width_mm          = 72.0
board_height_mm         = 55.0
board_thickness_mm      = 1.6
component_height_mm     = 12.8
solder_protrusion_mm    = 3.0
insert_spacing_width_mm = 64.0
insert_spacing_height_mm = 47.0
solder_clearance_depth_mm = 3.0
corner_boss_radius_mm   = 2.5
